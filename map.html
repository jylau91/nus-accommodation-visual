<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Interactive map of NUS student accommodation and coliving options near Kent Ridge." />
  <title>NUS Accommodation Map</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;750&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f4ee;
      --paper: #fffdf8;
      --ink: #202124;
      --muted: #63635f;
      --line: #ded8cc;
      --green: #2e7d32;
      --blue: #1565c0;
      --orange: #ef6c00;
      --radius: 22px;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --shadow: 0 4px 24px rgba(37,31,20,.12);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: var(--sans);
      color: var(--ink);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a { color: #174ea6; text-decoration-thickness: .08em; text-underline-offset: .18em; }
    a:hover { color: #0b3d91; }

    /* ── Header ── */
    .topbar {
      background: rgba(255,253,248,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 56px;
      flex-shrink: 0;
      z-index: 1000;
    }
    .topbar-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--ink);
      white-space: nowrap;
    }
    .topbar-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
      background: var(--paper);
      white-space: nowrap;
      transition: box-shadow .14s ease;
    }
    .topbar-back:hover { box-shadow: 0 2px 10px rgba(37,31,20,.10); color: var(--ink); }

    /* ── Filter bar ── */
    .filterbar {
      background: rgba(255,253,248,.95);
      border-bottom: 1px solid var(--line);
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 20px;
      flex-shrink: 0;
      z-index: 900;
    }
    .filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-pills { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

    .pill-toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--line);
      background: var(--paper);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: all .14s ease;
      white-space: nowrap;
    }
    .pill-toggle.active { color: #fff; border-color: transparent; }
    .pill-toggle .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .price-range-group { display: flex; align-items: center; gap: 10px; }
    .price-range-group input[type=range] {
      accent-color: var(--blue);
      width: 140px;
      cursor: pointer;
    }
    .price-range-label { font-size: 13px; color: var(--ink); min-width: 120px; white-space: nowrap; }

    /* ── Map ── */
    #map {
      flex: 1;
      min-height: 0;
    }

    /* ── Popup styling ── */
    .leaflet-popup-content-wrapper {
      border-radius: 14px !important;
      box-shadow: var(--shadow) !important;
      border: 1px solid var(--line) !important;
      background: var(--paper) !important;
      padding: 0 !important;
      min-width: 220px;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip { background: var(--paper) !important; }

    .popup-inner { padding: 16px 18px; }
    .popup-name { font-size: 15px; font-weight: 700; margin: 0 0 8px; line-height: 1.3; }
    .popup-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }
    .popup-row { display: flex; justify-content: space-between; gap: 12px; font-size: 13px; color: var(--muted); margin-top: 4px; }
    .popup-row b { color: var(--ink); font-weight: 600; }
    .popup-price { font-size: 13px; font-weight: 700; color: var(--ink); margin-top: 8px; }
    .popup-best { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.4; border-top: 1px solid var(--line); padding-top: 8px; }
    .popup-link { display: inline-flex; margin-top: 10px; font-size: 12px; font-weight: 700; color: #174ea6; text-decoration: none; }

    /* ── Legend ── */
    .map-legend {
      background: rgba(255,253,248,.94);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      min-width: 180px;
    }
    .legend-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 9px; font-size: 13px; margin-top: 5px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .topbar { height: 50px; }
      .filterbar { gap: 8px 14px; padding: 8px 12px; }
      .price-range-group input[type=range] { width: 100px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a class="topbar-back" href="index.html">&#8592; Ranking</a>
    <span class="topbar-title">NUS Accommodation Map</span>
  </div>

  <div class="filterbar">
    <div class="filter-group">
      <span class="filter-label">Type</span>
      <span class="filter-pills" id="typeFilters"></span>
    </div>
    <div class="filter-group price-range-group">
      <span class="filter-label">Max price</span>
      <input type="range" id="priceSlider" min="600" max="3000" value="3000" step="50" />
      <span class="price-range-label" id="priceLabel">All prices</span>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data/accommodations.js"></script>
  <script>
    (function () {
      var mapEl = document.getElementById('map');
      var typeFiltersEl = document.getElementById('typeFilters');
      var priceSlider = document.getElementById('priceSlider');
      var priceLabel = document.getElementById('priceLabel');
      var typePalette = ['#2e7d32', '#1565c0', '#ef6c00', '#7b1fa2', '#00838f', '#c62828', '#6d4c41', '#5e35b1', '#455a64', '#ad6800'];
      var typeList = Array.from(new Set(options.map(function (o) { return o.type; })));
      var typeColors = {};
      typeList.forEach(function (type, i) { typeColors[type] = typePalette[i % typePalette.length]; });
      var activeTypes = {};
      typeList.forEach(function (type) { activeTypes[type] = true; });
      var markers = [];
      var map;
      var priceValues = options.map(function (o) { return o.price && o.price.max ? o.price.max : 0; }).filter(Boolean);
      var sliderMax = Math.max(3000, Math.ceil(Math.max.apply(null, priceValues) / 500) * 500);
      var maxPrice = sliderMax;

      mapEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--sans);color:var(--muted);font-size:14px;">Loading map…</div>';
      priceSlider.min = 500;
      priceSlider.max = sliderMax;
      priceSlider.step = 100;
      priceSlider.value = sliderMax;
      priceLabel.textContent = 'All prices';

      function escapeHtml(s) {
        return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
          return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
        });
      }

      function showError(msg) {
        mapEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--sans);color:var(--muted);font-size:14px;text-align:center;padding:24px;line-height:1.6;">' + msg + '</div>';
      }

      function detailHref(o) {
        return 'index.html?option=' + encodeURIComponent(o.id) + '#interactive';
      }

      function commuteText(o) {
        return o.commute ? (o.commute.time + ' · ' + o.commute.mode) : 'Commute check pending';
      }

      function renderTypeFilters() {
        typeFiltersEl.innerHTML = typeList.map(function (type) {
          var color = typeColors[type];
          return '<span class="pill-toggle active" data-type="' + escapeHtml(type) + '" style="background:' + color + '">' +
            '<span class="dot" style="background:rgba(255,255,255,.82)"></span>' + escapeHtml(type) + '</span>';
        }).join('');
        typeFiltersEl.querySelectorAll('.pill-toggle').forEach(function (pill) {
          pill.addEventListener('click', function () {
            var type = pill.dataset.type;
            var activeCount = Object.keys(activeTypes).filter(function (k) { return activeTypes[k]; }).length;
            if (activeTypes[type] && activeCount <= 1) return;
            activeTypes[type] = !activeTypes[type];
            pill.classList.toggle('active', activeTypes[type]);
            pill.style.background = activeTypes[type] ? typeColors[type] : 'var(--paper)';
            refresh();
          });
        });
      }

      function makeIcon(color) {
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">' +
          '<ellipse cx="14" cy="33" rx="5" ry="2" fill="rgba(0,0,0,.18)"/>' +
          '<path d="M14 2C8.48 2 4 6.48 4 12c0 7.5 10 22 10 22s10-14.5 10-22c0-5.52-4.48-10-10-10z" fill="' + color + '" stroke="#fff" stroke-width="1.5"/>' +
          '<circle cx="14" cy="12" r="4.5" fill="#fff" fill-opacity=".85"/>' +
          '</svg>';
        return L.divIcon({ html: svg, className: '', iconSize: [28, 36], iconAnchor: [14, 36], popupAnchor: [0, -36] });
      }

      function popupHtml(o) {
        var color = typeColors[o.type] || '#888';
        var price = o.price ? o.price.label : 'Price check pending';
        return '<div class="popup-inner">' +
          '<p class="popup-name">' + escapeHtml(o.name) + '</p>' +
          '<span class="popup-badge" style="background:' + color + '">' + escapeHtml(o.type) + '</span>' +
          '<p class="popup-price">' + escapeHtml(price) + '</p>' +
          '<div class="popup-row"><span>Distance to NUS</span><b>' + Number(o.distance).toFixed(1) + ' km</b></div>' +
          '<div class="popup-row"><span>Commute</span><b>' + escapeHtml(commuteText(o)) + '</b></div>' +
          '<div class="popup-row"><span>Quality signal</span><b>' + Number(o.quality).toFixed(2) + '/5</b></div>' +
          '<p class="popup-best">' + escapeHtml(o.bestFor) + '</p>' +
          '<a class="popup-link" href="' + detailHref(o) + '">View details & sources →</a>' +
          '</div>';
      }

      function visible(o) {
        if (!activeTypes[o.type]) return false;
        if (o.price && o.price.min !== null && o.price.min > maxPrice) return false;
        return true;
      }

      function refresh() {
        if (!map) return;
        markers.forEach(function (m) {
          if (visible(m._optionData)) {
            if (!map.hasLayer(m)) m.addTo(map);
          } else {
            if (map.hasLayer(m)) map.removeLayer(m);
          }
        });
      }

      function addLegend() {
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
          var div = L.DomUtil.create('div', 'map-legend');
          div.innerHTML = '<div class="legend-title">Accommodation type</div>' + typeList.map(function (type) {
            return '<div class="legend-item"><span class="legend-dot" style="background:' + typeColors[type] + '"></span>' + escapeHtml(type) + '</div>';
          }).join('');
          return div;
        };
        legend.addTo(map);
      }

      function startMap() {
        renderTypeFilters();
        if (typeof L === 'undefined') {
          showError('Map failed to load.<br>Check your internet connection and refresh.');
          return;
        }
        mapEl.innerHTML = '';
        map = L.map('map', { center: [1.2966, 103.7764], zoom: 13, zoomControl: true });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; OpenStreetMap contributors',
          maxZoom: 19
        }).addTo(map);
        options.forEach(function (o) {
          if (!o.coords) return;
          var marker = L.marker(o.coords, { icon: makeIcon(typeColors[o.type] || '#888') }).bindPopup(popupHtml(o), { maxWidth: 310 });
          marker._optionData = o;
          markers.push(marker);
          marker.addTo(map);
        });
        addLegend();
      }

      priceSlider.addEventListener('input', function () {
        maxPrice = Number(priceSlider.value);
        priceLabel.textContent = maxPrice >= sliderMax ? 'All prices' : 'Up to S$' + maxPrice.toLocaleString('en-SG') + '/mo';
        refresh();
      });

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startMap);
      else startMap();

      setTimeout(function () {
        if (typeof L === 'undefined') showError('Map failed to load.<br>Check your internet and refresh.');
      }, 4000);
    })();
  </script>
</body>
</html>
