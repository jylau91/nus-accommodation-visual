<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Interactive map of NUS student accommodation and coliving options near Kent Ridge." />
  <title>NUS Accommodation Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;750&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f4ee;
      --paper: #fffdf8;
      --ink: #202124;
      --muted: #63635f;
      --line: #ded8cc;
      --green: #2e7d32;
      --blue: #1565c0;
      --orange: #ef6c00;
      --radius: 22px;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --shadow: 0 4px 24px rgba(37,31,20,.12);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: var(--sans);
      color: var(--ink);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a { color: #174ea6; text-decoration-thickness: .08em; text-underline-offset: .18em; }
    a:hover { color: #0b3d91; }

    /* ── Header ── */
    .topbar {
      background: rgba(255,253,248,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 56px;
      flex-shrink: 0;
      z-index: 1000;
    }
    .topbar-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--ink);
      white-space: nowrap;
    }
    .topbar-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
      background: var(--paper);
      white-space: nowrap;
      transition: box-shadow .14s ease;
    }
    .topbar-back:hover { box-shadow: 0 2px 10px rgba(37,31,20,.10); color: var(--ink); }

    /* ── Filter bar ── */
    .filterbar {
      background: rgba(255,253,248,.95);
      border-bottom: 1px solid var(--line);
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 20px;
      flex-shrink: 0;
      z-index: 900;
    }
    .filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }

    .pill-toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--line);
      background: var(--paper);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: all .14s ease;
      white-space: nowrap;
    }
    .pill-toggle.active { color: #fff; border-color: transparent; }
    .pill-toggle.active.campus { background: var(--green); }
    .pill-toggle.active.coliving { background: var(--blue); }
    .pill-toggle.active.hostel { background: var(--orange); }
    .pill-toggle .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .price-range-group { display: flex; align-items: center; gap: 10px; }
    .price-range-group input[type=range] {
      accent-color: var(--blue);
      width: 140px;
      cursor: pointer;
    }
    .price-range-label { font-size: 13px; color: var(--ink); min-width: 120px; white-space: nowrap; }

    /* ── Map ── */
    #map {
      flex: 1;
      min-height: 0;
    }

    /* ── Popup styling ── */
    .leaflet-popup-content-wrapper {
      border-radius: 14px !important;
      box-shadow: var(--shadow) !important;
      border: 1px solid var(--line) !important;
      background: var(--paper) !important;
      padding: 0 !important;
      min-width: 220px;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip { background: var(--paper) !important; }

    .popup-inner { padding: 16px 18px; }
    .popup-name { font-size: 15px; font-weight: 700; margin: 0 0 8px; line-height: 1.3; }
    .popup-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }
    .popup-row { display: flex; justify-content: space-between; gap: 12px; font-size: 13px; color: var(--muted); margin-top: 4px; }
    .popup-row b { color: var(--ink); font-weight: 600; }
    .popup-price { font-size: 13px; font-weight: 700; color: var(--ink); margin-top: 8px; }
    .popup-best { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.4; border-top: 1px solid var(--line); padding-top: 8px; }

    /* ── Legend ── */
    .map-legend {
      position: absolute;
      bottom: 28px;
      right: 10px;
      z-index: 800;
      background: rgba(255,253,248,.94);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      min-width: 160px;
    }
    .legend-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 9px; font-size: 13px; margin-top: 5px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .topbar { height: 50px; }
      .filterbar { gap: 8px 14px; padding: 8px 12px; }
      .price-range-group input[type=range] { width: 100px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a class="topbar-back" href="index.html">&#8592; Ranking</a>
    <span class="topbar-title">NUS Accommodation Map</span>
  </div>

  <div class="filterbar">
    <div class="filter-group">
      <span class="filter-label">Type</span>
      <span class="pill-toggle active campus" data-type="Campus">
        <span class="dot" style="background:#2e7d32"></span>Campus
      </span>
      <span class="pill-toggle active coliving" data-type="Coliving">
        <span class="dot" style="background:#1565c0"></span>Coliving
      </span>
      <span class="pill-toggle active hostel" data-type="Student hostel">
        <span class="dot" style="background:#ef6c00"></span>Student hostel
      </span>
    </div>
    <div class="filter-group price-range-group">
      <span class="filter-label">Max price</span>
      <input type="range" id="priceSlider" min="600" max="3000" value="3000" step="50" />
      <span class="price-range-label" id="priceLabel">All prices</span>
    </div>
  </div>

  <div id="map">
    <div class="map-legend">
      <div class="legend-title">Accommodation type</div>
      <div class="legend-item"><span class="legend-dot" style="background:#2e7d32"></span>Campus</div>
      <div class="legend-item"><span class="legend-dot" style="background:#1565c0"></span>Coliving</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ef6c00"></span>Student hostel</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WPeM=" crossorigin=""></script>
  <script src="data/accommodations.js"></script>
  <script>
    const typeColors = { Campus: '#2e7d32', Coliving: '#1565c0', 'Student hostel': '#ef6c00' };

    const map = L.map('map', {
      center: [1.2966, 103.7764],
      zoom: 13,
      zoomControl: true
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    function makeIcon(color) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
        <ellipse cx="14" cy="33" rx="5" ry="2" fill="rgba(0,0,0,.18)"/>
        <path d="M14 2C8.48 2 4 6.48 4 12c0 7.5 10 22 10 22s10-14.5 10-22c0-5.52-4.48-10-10-10z"
          fill="${color}" stroke="#fff" stroke-width="1.5"/>
        <circle cx="14" cy="12" r="4.5" fill="#fff" fill-opacity=".85"/>
      </svg>`;
      return L.divIcon({
        html: svg,
        className: '',
        iconSize: [28, 36],
        iconAnchor: [14, 36],
        popupAnchor: [0, -36]
      });
    }

    function qualityStars(q) {
      const full = Math.floor(q);
      const half = q - full >= 0.25 ? 1 : 0;
      return '★'.repeat(full) + (half ? '½' : '') + ' ' + q.toFixed(1) + '/5';
    }

    function popupHtml(o) {
      const color = typeColors[o.type];
      const price = o.price ? o.price.label : 'Price check pending';
      return `<div class="popup-inner">
        <p class="popup-name">${o.name}</p>
        <span class="popup-badge" style="background:${color}">${o.type}</span>
        <p class="popup-price">${price}</p>
        <div class="popup-row"><span>Distance to NUS</span><b>${o.distance} km</b></div>
        <div class="popup-row"><span>Quality rating</span><b>${qualityStars(o.quality)}</b></div>
        <p class="popup-best">${o.bestFor}</p>
      </div>`;
    }

    const markers = [];

    options.forEach(o => {
      const color = typeColors[o.type];
      const marker = L.marker(o.coords, { icon: makeIcon(color) })
        .bindPopup(popupHtml(o), { maxWidth: 280 });
      marker._optionData = o;
      markers.push(marker);
      marker.addTo(map);
    });

    let activeTypes = new Set(['Campus', 'Coliving', 'Student hostel']);
    let maxPrice = 3000;

    function visible(o) {
      if (!activeTypes.has(o.type)) return false;
      if (o.price && o.price.min !== null && o.price.min > maxPrice) return false;
      return true;
    }

    function refresh() {
      markers.forEach(m => {
        if (visible(m._optionData)) {
          if (!map.hasLayer(m)) m.addTo(map);
        } else {
          if (map.hasLayer(m)) map.removeLayer(m);
        }
      });
    }

    document.querySelectorAll('.pill-toggle').forEach(pill => {
      pill.addEventListener('click', () => {
        const type = pill.dataset.type;
        if (activeTypes.has(type)) {
          if (activeTypes.size === 1) return;
          activeTypes.delete(type);
          pill.classList.remove('active');
        } else {
          activeTypes.add(type);
          pill.classList.add('active');
        }
        refresh();
      });
    });

    const priceSlider = document.getElementById('priceSlider');
    const priceLabel = document.getElementById('priceLabel');

    priceSlider.addEventListener('input', () => {
      maxPrice = Number(priceSlider.value);
      priceLabel.textContent = maxPrice >= 3000 ? 'All prices' : `Up to S$${maxPrice.toLocaleString('en-SG')}/mo`;
      refresh();
    });
  </script>
</body>
</html>
